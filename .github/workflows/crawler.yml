name: Get Hot News

on:
  schedule:
    # 每小时运行一次，配合 timeline.yaml 在北京时间 09:00-10:59 内只推送一次
    - cron: "0 * * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: false
        default: "normal"
        type: choice
        options:
          - normal
          - notification_test

concurrency:
  group: crawler-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      # --------------------------------------------------------------------------------
      # 🚦 TRAFFIC CONTROL / 流量控制
      # --------------------------------------------------------------------------------
      # EN: Generates a random delay between 1 and 300 seconds (5 minutes).
      #     Critical for load balancing.
      #
      # CN: 生成 1 到 300 秒（5分钟）之间的随机延迟。
      #     这对负载均衡至关重要。
      # - name: Random Delay (Traffic Control)
      #   if: success()
      #   run: |
      #     echo "🎲 Traffic Control: Generating random delay..."
      #     DELAY=$(( ( RANDOM % 300 )  + 1 ))
      #     echo "⏸️  Sleeping for ${DELAY} seconds to spread the load..."
      #     sleep ${DELAY}s
      #     echo "▶️  Delay finished. Starting crawler..."

      - name: Set up Python
        if: success()
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        if: success()
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify required files
        if: success()
        run: |
          if [ ! -f config/config.yaml ]; then
            echo "Error: Config missing"
            exit 1
          fi

      - name: Restore persisted state
        if: success() && github.event.inputs.mode != 'notification_test'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STATE_BRANCH: trendradar-state
        run: |
          set -euo pipefail

          STATE_DIR="$(mktemp -d)"
          trap 'rm -rf "$STATE_DIR"' EXIT
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git clone --depth 1 --branch "$STATE_BRANCH" "$REPO_URL" "$STATE_DIR" >/dev/null 2>&1; then
            mkdir -p output/news output/rss
            cp -f "$STATE_DIR"/output/news/*.db output/news/ 2>/dev/null || true
            cp -f "$STATE_DIR"/output/rss/*.db output/rss/ 2>/dev/null || true
            echo "已恢复持久化数据库状态"
          else
            echo "首次运行，未找到持久化状态分支"
          fi

      - name: Run crawler
        if: success()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # 通用Webhook配置
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
          GENERIC_WEBHOOK_TEMPLATE: ${{ secrets.GENERIC_WEBHOOK_TEMPLATE }}
          # AI 配置（ai_analysis 和 ai_translation 共享模型配置）
          AI_ANALYSIS_ENABLED: ${{ secrets.AI_ANALYSIS_ENABLED }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          # 远程存储配置
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
          GITHUB_ACTIONS: true
        run: |
          if [ "${{ github.event.inputs.mode }}" = "notification_test" ]; then
            python -m trendradar --test-notification
          else
            python -m trendradar
          fi

      - name: Persist latest state
        if: success() && github.event.inputs.mode != 'notification_test'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STATE_BRANCH: trendradar-state
        run: |
          set -euo pipefail

          STATE_DIR="$(mktemp -d)"
          trap 'rm -rf "$STATE_DIR"' EXIT
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p output/news output/rss

          git init "$STATE_DIR" >/dev/null
          cd "$STATE_DIR"
          git checkout -b "$STATE_BRANCH" >/dev/null 2>&1
          git remote add origin "$REPO_URL"

          if git fetch --depth 1 origin "$STATE_BRANCH" >/dev/null 2>&1; then
            git reset --hard FETCH_HEAD >/dev/null 2>&1
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          mkdir -p output/news output/rss
          cp -f "$GITHUB_WORKSPACE"/output/news/*.db output/news/ 2>/dev/null || true
          cp -f "$GITHUB_WORKSPACE"/output/rss/*.db output/rss/ 2>/dev/null || true

          python - <<'PY'
          from datetime import datetime, timedelta
          from pathlib import Path
          import pytz

          tz = pytz.timezone("Asia/Shanghai")
          today = datetime.now(tz).date()
          keep_dates = {(today - timedelta(days=i)).isoformat() for i in range(2)}

          for folder in (Path("output/news"), Path("output/rss")):
              folder.mkdir(parents=True, exist_ok=True)
              for db_file in folder.glob("*.db"):
                  if db_file.stem not in keep_dates:
                      db_file.unlink()
          PY

          git add output/news output/rss

          if git diff --cached --quiet; then
            echo "数据库状态无变化，跳过提交"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: persist trendradar state"
          git push origin HEAD:"$STATE_BRANCH"
